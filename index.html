<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: auto;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .label { width: 80px; }
    .num { width: 70px; }
    .slider { flex: 1; }
    .val { width: 40px; text-align: right; }

    input, select, button { margin-top: 4px; }
  </style>
</head>

<body>

<h1>Calorie Tracker</h1>

<div id="saveMsg" style="display:none;background:#d4edda;padding:8px;">✅ Saved!</div>

<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br>
Fiber: <input id="goalFiber" type="number" value="25"><br>
Iron: <input id="goalIron" type="number" value="10"><br><br>

<input id="nameInput" placeholder="Food"><br><br>

<!-- INPUT ROWS -->
<div class="row">
  <div class="label">Calories</div>
  <input id="calories" class="num" type="number" value="0" oninput="syncSlider('calories')">
  <input id="caloriesSlider" class="slider" type="range" min="0" max="1000" value="0" oninput="syncInput('calories')">
  <div id="caloriesDisplay" class="val">0</div>
</div>

<div class="row">
  <div class="label">Protein</div>
  <input id="protein" class="num" type="number" value="0" oninput="syncSlider('protein')">
  <input id="proteinSlider" class="slider" type="range" min="0" max="100" value="0" oninput="syncInput('protein')">
  <div id="proteinDisplay" class="val">0</div>
</div>

<div class="row">
  <div class="label">Carbs</div>
  <input id="carbs" class="num" type="number" value="0" oninput="syncSlider('carbs')">
  <input id="carbsSlider" class="slider" type="range" min="0" max="200" value="0" oninput="syncInput('carbs')">
  <div id="carbsDisplay" class="val">0</div>
</div>

<div class="row">
  <div class="label">Fat</div>
  <input id="fat" class="num" type="number" value="0" oninput="syncSlider('fat')">
  <input id="fatSlider" class="slider" type="range" min="0" max="100" value="0" oninput="syncInput('fat')">
  <div id="fatDisplay" class="val">0</div>
</div>

<div class="row">
  <div class="label">Fiber</div>
  <input id="fiber" class="num" type="number" value="0" oninput="syncSlider('fiber')">
  <input id="fiberSlider" class="slider" type="range" min="0" max="50" value="0" oninput="syncInput('fiber')">
  <div id="fiberDisplay" class="val">0</div>
</div>

<div class="row">
  <div class="label">Iron</div>
  <input id="iron" class="num" type="number" value="0" oninput="syncSlider('iron')">
  <input id="ironSlider" class="slider" type="range" min="0" max="30" value="0" oninput="syncInput('iron')">
  <div id="ironDisplay" class="val">0</div>
</div>

<br>

<select id="source">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Dessert</option>
  <option>Snack</option>
  <option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<!-- ✅ FIXED FORM -->
<form id="postForm"
  action="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec"
  method="POST"
  target="hiddenFrame">
  <input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<b>Today</b>
<div id="todayStats"></div>

<br>

<b>Average</b>
<div id="avgStats"></div>

<hr>

<canvas id="chart" height="200"></canvas>
<canvas id="pie" height="200"></canvas>

<hr>

<pre id="debug"></pre>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec";
let chart, pie;

function round(v){ return Math.round(v*10)/10; }
function pct(v,g){ return Math.round((v/g)*100)||0; }
function color(v,g){
  const p=v/g;
  return p<.5?"red":p<.75?"orange":p<.9?"gold":"green";
}

function syncSlider(id){
  const v=+document.getElementById(id).value||0;
  document.getElementById(id+"Slider").value=v;
  document.getElementById(id+"Display").innerText=v;
}
function syncInput(id){
  const v=+document.getElementById(id+"Slider").value;
  document.getElementById(id).value=v;
  document.getElementById(id+"Display").innerText=v;
}

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(document.activeElement.type==="date") return;
    e.preventDefault();
    addEntry();
  }
});

function addEntry(){
  const data={
    date:new Date().toISOString().slice(0,10),
    name:nameInput.value.trim(),
    calories:+calories.value||0,
    protein:+protein.value||0,
    carbs:+carbs.value||0,
    fat:+fat.value||0,
    fiber:+fiber.value||0,
    iron:+iron.value||0,
    source:source.value
  };

  if(!data.name){ alert("Enter food"); return; }

  formData.value=JSON.stringify(data);
  postForm.submit();

  saveMsg.style.display="block";
  setTimeout(()=>saveMsg.style.display="none",1000);

  ["calories","protein","carbs","fat","fiber","iron"].forEach(id=>{
    document.getElementById(id).value=0;
    document.getElementById(id+"Slider").value=0;
    document.getElementById(id+"Display").innerText=0;
  });

  nameInput.value="";
  nameInput.focus();

  setTimeout(loadData,700);
}

function loadData(){
  document.querySelectorAll(".data-script").forEach(s=>s.remove());
  const s=document.createElement("script");
  s.className="data-script";
  s.src=URL+"?callback=handleData"+"&"+"cb="+Date.now();
  document.body.appendChild(s);
}

function handleData(d){
  debug.innerText=JSON.stringify(d,null,2);
  process(d);
}

function process(data){
  const clean=data.map(e=>({
    ...e,
    date:e.date.slice(0,10),
    fiber:+e.fiber||0,
    iron:+e.iron||0
  }));

  const sum=(arr,k)=>arr.reduce((s,e)=>s+(+e[k]||0),0);

  const today=new Date().toISOString().slice(0,10);
  const t=clean.filter(e=>e.date===today);

  todayStats.innerHTML =
  `Calories ${round(sum(t,"calories"))} |
   Protein ${round(sum(t,"protein"))} |
   Carbs ${round(sum(t,"carbs"))} |
   Fat ${round(sum(t,"fat"))} |
   Fiber ${round(sum(t,"fiber"))} |
   Iron ${round(sum(t,"iron"))}`;
}

loadData();
</script>

<div style="color:gray;">Version 28.2 ✅</div>

</body>
</html>
