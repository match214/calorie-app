<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; max-width:700px; margin:auto;">

<h1>Calorie Tracker</h1>

<div id="saveMsg" style="background:#d4edda; padding:8px; display:none;">
✅ Saved!
</div>

<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br><br>

<input id="nameInput" placeholder="Food"><br><br>

<!-- INPUTS -->
Calories: <span id="caloriesDisplay">0</span><br>
<input id="calories" type="number" value="0" oninput="syncSlider('calories')">
<input id="caloriesSlider" type="range" min="0" max="1000" oninput="syncInput('calories')"><br><br>

Protein: <span id="proteinDisplay">0</span><br>
<input id="protein" type="number" value="0" oninput="syncSlider('protein')">
<input id="proteinSlider" type="range" min="0" max="100" oninput="syncInput('protein')"><br><br>

Carbs: <span id="carbsDisplay">0</span><br>
<input id="carbs" type="number" value="0" oninput="syncSlider('carbs')">
<input id="carbsSlider" type="range" min="0" max="200" oninput="syncInput('carbs')"><br><br>

Fat: <span id="fatDisplay">0</span><br>
<input id="fat" type="number" value="0" oninput="syncSlider('fat')">
<input id="fatSlider" type="range" min="0" max="100" oninput="syncInput('fat')"><br><br>

Fiber: <span id="fiberDisplay">0</span><br>
<input id="fiber" type="number" value="0" oninput="syncSlider('fiber')">
<input id="fiberSlider" type="range" min="0" max="50" oninput="syncInput('fiber')"><br><br>

Iron: <span id="ironDisplay">0</span><br>
<input id="iron" type="number" value="0" oninput="syncSlider('iron')">
<input id="ironSlider" type="range" min="0" max="30" oninput="syncInput('iron')"><br><br>

<select id="source">
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
<option>Dessert</option>
<option>Snack</option>
<option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<form id="postForm"
action="YOUR_SCRIPT_URL_HERE"
method="POST"
target="hiddenFrame">
<input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">
<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>

<hr>

<b>Today</b><br>
<span id="todayStats"></span>

<br><br>

<b>Average (Range)</b><br>
<span id="avgStats"></span>

<hr>

<canvas id="chart"></canvas>
<canvas id="pie"></canvas>
<canvas id="goalChart"></canvas>

<script>
const URL="YOUR_SCRIPT_URL_HERE";

/* ADD */
function addEntry(){
const date=new Date().toISOString().slice(0,10);

const data={
date,
name:nameInput.value.trim(),
calories:+calories.value||0,
protein:+protein.value||0,
carbs:+carbs.value||0,
fat:+fat.value||0,
fiber:+fiber.value||0,
iron:+iron.value||0,
source:source.value
};

if(!data.name){alert("Enter food");return;}

formData.value=JSON.stringify(data);
postForm.submit();

saveMsg.style.display="block";
setTimeout(()=>saveMsg.style.display="none",1000);

["calories","protein","carbs","fat","fiber","iron"].forEach(f=>{
document.getElementById(f).value=0;
document.getElementById(f+"Slider").value=0;
document.getElementById(f+"Display").innerText=0;
});

nameInput.value="";
setTimeout(loadData,600);
}

/* SYNC */
function syncSlider(f){
let v=document.getElementById(f).value||0;
document.getElementById(f+"Slider").value=v;
document.getElementById(f+"Display").innerText=v;
}
function syncInput(f){
let v=document.getElementById(f+"Slider").value;
document.getElementById(f).value=v;
document.getElementById(f+"Display").innerText=v;
}

/* LOAD */
function loadData(){
let s=document.createElement("script");
s.src=URL+"?callback=handleData&cb="+Date.now();
document.body.appendChild(s);
}

function handleData(data){process(data);}

/* PROCESS */
function process(data){

const start=startDate.value;
const end=endDate.value;

const clean=data.map(e=>({
...e,
date:e.date.slice(0,10),
fiber:Number(e.fiber)||0,
iron:Number(e.iron)||0
})).filter(e=>e.name && e.source && +e.calories>0);

const filtered=clean.filter(e=>{
if(!start||!end) return true;
return e.date>=start && e.date<=end;
});

const sum=(arr,k)=>arr.reduce((s,e)=>s+(+e[k]||0),0);

/* TODAY */
const today=new Date().toISOString().slice(0,10);
const t=clean.filter(e=>e.date===today);

todayStats.innerText=
`Calories ${sum(t,"calories")}/${goalCalories.value} |
Protein ${sum(t,"protein")} |
Carbs ${sum(t,"carbs")} |
Fat ${sum(t,"fat")} |
Fiber ${sum(t,"fiber")}g |
Iron ${sum(t,"iron")}mg`;

/* AVG */
const days=[...new Set(filtered.map(e=>e.date))];
const n=days.length||1;

avgStats.innerText=
`Calories ${Math.round(sum(filtered,"calories")/n)} |
Protein ${Math.round(sum(filtered,"protein")/n)} |
Carbs ${Math.round(sum(filtered,"carbs")/n)} |
Fat ${Math.round(sum(filtered,"fat")/n)} |
Fiber ${Math.round(sum(filtered,"fiber")/n)}g |
Iron ${Math.round(sum(filtered,"iron")/n)}mg`;

/* CHARTS */
const byDate={};
filtered.forEach(e=>{
if(!byDate[e.date])byDate[e.date]={c:0};
byDate[e.date].c+=+e.calories;
});

let labels=Object.keys(byDate).sort();

if(window.chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels,datasets:[{data:labels.map(d=>byDate[d].c)}]}
});

/* BAR */
const order=["Breakfast","Lunch","Snack","Dinner","Dessert","Drink"];
const bySource={};

filtered.forEach(e=>{
if(!order.includes(e.source))return;
if(!bySource[e.source])bySource[e.source]=0;
bySource[e.source]+=+e.calories;
});

if(window.pie) pie.destroy();
pie=new Chart(document.getElementById("pie"),{
type:"bar",
data:{
labels:order.filter(s=>bySource[s]),
datasets:[{data:order.filter(s=>bySource[s]).map(s=>bySource[s])}]
}
});
}

function setRange(d){
let end=new Date(),start=new Date();
start.setDate(end.getDate()-d);
startDate.value=start.toISOString().slice(0,10);
endDate.value=end.toISOString().slice(0,10);
loadData();
}

loadData();
</script>

<div>Version 17.0 ✅</div>

</body>
</html>
