
<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; max-width:700px; margin:auto;">

<h1>Calorie Tracker</h1>

<div id="saveMsg" style="background:#d4edda; padding:8px; display:none;">
✅ Saved!
</div>

<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br><br>

<input id="nameInput" placeholder="Food"><br><br>

<!-- INPUTS -->
Calories: <span id="caloriesDisplay">0</span><br>
<input id="calories" type="number" value="0" oninput="syncSlider('calories')">
<input id="caloriesSlider" type="range" min="0" max="1000"><br><br>

Protein: <span id="proteinDisplay">0</span><br>
<input id="protein" type="number" value="0" oninput="syncSlider('protein')">
<input id="proteinSlider" type="range" min="0" max="100"><br><br>

Carbs: <span id="carbsDisplay">0</span><br>
<input id="carbs" type="number" value="0" oninput="syncSlider('carbs')">
<input id="carbsSlider" type="range" min="0" max="200"><br><br>

Fat: <span id="fatDisplay">0</span><br>
<input id="fat" type="number" value="0" oninput="syncSlider('fat')">
<input id="fatSlider" type="range" min="0" max="100"><br><br>

<select id="source">
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
<option>Dessert</option>
<option>Snack</option>
<option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<form id="postForm"
action="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec"
method="POST"
target="hiddenFrame">
<input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">
<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>

<hr>

<b>Today</b><br>
<span id="todayStats"></span>

<br><br>

<b>Average (Range)</b><br>
<span id="avgStats"></span>

<hr>

<canvas id="chart"></canvas>
<canvas id="pie"></canvas>
<canvas id="goalChart"></canvas>

<hr>
<pre id="debug" style="font-size:10px"></pre>

<script>
const URL="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec";

/* ---------- ADD ---------- */
function addEntry(){
const today=new Date().toISOString().slice(0,10);

const data={
date: today,
name: nameInput.value.trim(),
calories: +calories.value||0,
protein: +protein.value||0,
carbs: +carbs.value||0,
fat: +fat.value||0,
source: source.value
};

if(!data.name){alert("Enter food"); return;}

formData.value=JSON.stringify(data);
postForm.submit();

saveMsg.style.display="block";
setTimeout(()=>saveMsg.style.display="none",1000);

["calories","protein","carbs","fat"].forEach(f=>{
document.getElementById(f).value=0;
document.getElementById(f+"Slider").value=0;
document.getElementById(f+"Display").innerText=0;
});

nameInput.value="";
setTimeout(loadData,700);
}

/* ---------- SYNC ---------- */
function syncSlider(f){
const v=document.getElementById(f).value||0;
document.getElementById(f+"Slider").value=v;
document.getElementById(f+"Display").innerText=v;
}

/* ---------- LOAD ---------- */
function loadData(){
const s=document.createElement("script");
s.src = URL + "?callback=handleData&cb=" + Date.now();
document.body.appendChild(s);
}

function handleData(data){
debug.innerText = JSON.stringify(data,null,2);
process(data);
}

/* ---------- PROCESS ---------- */
function process(data){

const start=startDate.value;
const end=endDate.value;

// ✅ CLEAN + FILTER
const filtered=data
.map(e=>({...e, date:e.date.slice(0,10)}))
.filter(e=>e.name && e.source && +e.calories>0)
.filter(e=>{
if(!start || !end) return true;
return e.date>=start && e.date<=end;
});

// ✅ TODAY (based on ALL data)
const today=new Date().toISOString().slice(0,10);
const todayData=data.filter(e=>e.date.slice(0,10)===today);

// rollups
const sum=(arr,k)=>arr.reduce((s,e)=>s+(+e[k]||0),0);

const tCal=sum(todayData,"calories");
const tPro=sum(todayData,"protein");
const tCarb=sum(todayData,"carbs");
const tFat=sum(todayData,"fat");

function pct(v,g){return Math.round((v/g)*100)||0;}

todayStats.innerText=
`Calories ${tCal}/${goalCalories.value} (${pct(tCal,goalCalories.value)}%) |
Protein ${tPro}/${goalProtein.value} | 
Carbs ${tCarb}/${goalCarbs.value} | 
Fat ${tFat}/${goalFat.value}`;

// ✅ AVERAGE
const days=[...new Set(filtered.map(e=>e.date))];
const n=days.length||1;

const avg={
cal: sum(filtered,"calories")/n,
pro: sum(filtered,"protein")/n,
carb: sum(filtered,"carbs")/n,
fat: sum(filtered,"fat")/n
};

function color(v,g){
const p=v/g;
return p<.5?"red":p<.75?"orange":p<.9?"gold":"green";
}

avgStats.innerHTML=
`Calories <span style="color:${color(avg.cal,goalCalories.value)}">${Math.round(avg.cal)}</span> |
Protein <span style="color:${color(avg.pro,goalProtein.value)}">${Math.round(avg.pro)}</span> |
Carbs <span style="color:${color(avg.carb,goalCarbs.value)}">${Math.round(avg.carb)}</span> |
Fat <span style="color:${color(avg.fat,goalFat.value)}">${Math.round(avg.fat)}</span>`;

/* ---------- CHART DATA ---------- */

const byDate={};

filtered.forEach(e=>{
if(!byDate[e.date]){
byDate[e.date]={cal:0,pro:0,carb:0,fat:0};
}
byDate[e.date].cal+=+e.calories;
byDate[e.date].pro+=+e.protein;
byDate[e.date].carb+=+e.carbs;
byDate[e.date].fat+=+e.fat;
});

const labels=Object.keys(byDate).sort();

// 🟢 CALORIES LINE
if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels,
datasets:[{
label:"Calories",
data:labels.map(d=>byDate[d].cal)
}]
}
});

// 🟢 CATEGORY BAR
const order=["Breakfast","Lunch","Snack","Dinner","Dessert","Drink"];
const colors={Breakfast:"red",Lunch:"orange",Snack:"yellow",Dinner:"green",Dessert:"blue",Drink:"purple"};

const bySource={};
filtered.forEach(e=>{
if(!order.includes(e.source)) return;
if(!bySource[e.source]) bySource[e.source]=0;
bySource[e.source]+=+e.calories;
});

if(pie) pie.destroy();
pie=new Chart(document.getElementById("pie"),{
type:"bar",
data:{
labels:order.filter(s=>bySource[s]),
datasets:[{
data:order.filter(s=>bySource[s]).map(s=>bySource[s]),
backgroundColor:order.filter(s=>bySource[s]).map(s=>colors[s])
}]
}
});

// 🟢 PERFORMANCE (ALL MACROS BACK)
if(goalChart) goalChart.destroy();
goalChart=new Chart(document.getElementById("goalChart"),{
type:"line",
data:{
labels,
datasets:[
{label:"Calories %",data:labels.map(d=>byDate[d].cal/goalCalories.value),borderColor:"red"},
{label:"Protein %",data:labels.map(d=>byDate[d].pro/goalProtein.value),borderColor:"green"},
{label:"Carbs %",data:labels.map(d=>byDate[d].carb/goalCarbs.value),borderColor:"orange"},
{label:"Fat %",data:labels.map(d=>byDate[d].fat/goalFat.value),borderColor:"purple"},
{label:"Goal",data:labels.map(()=>1),borderDash:[5,5]}
]
},
options:{
scales:{
y:{
ticks:{callback:v=>Math.round(v*100)+"%"}
}
}
}
});
}

/* ---------- RANGE ---------- */
function setRange(days){
const end=new Date();
const start=new Date();
start.setDate(end.getDate()-days);

startDate.value=start.toISOString().slice(0,10);
endDate.value=end.toISOString().slice(0,10);

loadData();
}

loadData();
</script>

<div>Version 15.0 ✅</div>

</body>
</html>
