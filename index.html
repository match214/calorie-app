
<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; max-width:600px; margin:auto;">

<h1>Calorie Tracker</h1>

<!-- GOALS -->
<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br><br>

<!-- FORM -->
<input id="name" placeholder="Food"><br>
<input id="calories" placeholder="Calories" type="number"><br>
<input id="protein" placeholder="Protein" type="number"><br>
<input id="carbs" placeholder="Carbs" type="number"><br>
<input id="fat" placeholder="Fat" type="number"><br>

<select id="source">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Dessert</option>
  <option>Snack</option>
  <option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<form id="postForm"
  action="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec"
  method="POST"
  target="hiddenFrame">

  <input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">

<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>

<hr>

<h3>Totals</h3>
Calories: <span id="total"></span><br>
Protein: <span id="proteinTotal"></span><br>
Carbs: <span id="carbsTotal"></span><br>
Fat: <span id="fatTotal"></span><br>

<h3>Goal Comparison</h3>
<div id="goalResults"></div>

<hr>

<canvas id="chart"></canvas>
<canvas id="pie"></canvas>

<hr>

<pre id="debug"></pre>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec";

/* ADD ENTRY */
function addEntry() {
  const now = new Date();
  const date = now.toISOString().slice(0,10);

  const data = {
    date,
    name: document.getElementById("name").value,
    calories: document.getElementById("calories").value,
    protein: document.getElementById("protein").value || 0,
    carbs: document.getElementById("carbs").value || 0,
    fat: document.getElementById("fat").value || 0,
    source: document.getElementById("source").value
  };

  document.getElementById("formData").value = JSON.stringify(data);
  document.getElementById("postForm").submit();

  setTimeout(loadData, 500);
}

/* LOAD DATA */
function loadData() {
  const script = document.createElement("script");
  script.src = SCRIPT_URL + "?callback=handleData";
  document.body.appendChild(script);
}

function handleData(data) {
  document.getElementById("debug").innerText =
    JSON.stringify(data, null, 2);

  processData(data);
}

/* PROCESS DATA */
function processData(data) {

  const filtered = data.filter(e => e.name && e.calories);

  const totals = filtered.reduce((sum, e) => ({
    calories: sum.calories + Number(e.calories),
    protein: sum.protein + Number(e.protein),
    carbs: sum.carbs + Number(e.carbs),
    fat: sum.fat + Number(e.fat)
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  document.getElementById("total").innerText = totals.calories;
  document.getElementById("proteinTotal").innerText = totals.protein;
  document.getElementById("carbsTotal").innerText = totals.carbs;
  document.getElementById("fatTotal").innerText = totals.fat;

  /* GOAL COMPARISON */
  const cGoal = Number(goalCalories.value);
  const pGoal = Number(goalProtein.value);
  const carbGoal = Number(goalCarbs.value);
  const fatGoal = Number(goalFat.value);

  function compare(val, goal) {
    const diff = val - goal;
    if (diff > 0) return `Over by ${diff}`;
    if (diff < 0) return `Under by ${Math.abs(diff)}`;
    return "On target";
  }

  document.getElementById("goalResults").innerHTML = `
    Calories: ${compare(totals.calories, cGoal)}<br>
    Protein: ${compare(totals.protein, pGoal)}<br>
    Carbs: ${compare(totals.carbs, carbGoal)}<br>
    Fat: ${compare(totals.fat, fatGoal)}
  `;

  renderChart(filtered);
  renderPie(filtered);
}

/* CHARTS */
let chart, pie;

function renderChart(data) {
  const byDate = {};
  data.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = 0;
    byDate[e.date] += Number(e.calories);
  });

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: Object.keys(byDate),
      datasets: [{
        label: "Calories",
        data: Object.values(byDate)
      }]
    }
  });
}

function renderPie(data) {
  const bySource = {};

  data.forEach(e => {
    if (!bySource[e.source]) bySource[e.source] = 0;
    bySource[e.source] += Number(e.calories);
  });

  if (pie) pie.destroy();

  pie = new Chart(document.getElementById("pie"), {
    type: "pie",
    data: {
      labels: Object.keys(bySource),
      datasets: [{ data: Object.values(bySource) }]
    }
  });
}

loadData();
</script>

</body>
</html>
