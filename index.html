<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; max-width:600px; margin:auto;">

<h1>Calorie Tracker</h1>

<!-- FORM -->
<input id="name" placeholder="Food"><br>
<input id="calories" placeholder="Calories" type="number"><br>
<input id="protein" placeholder="Protein" type="number"><br>
<input id="carbs" placeholder="Carbs" type="number"><br>
<input id="fat" placeholder="Fat" type="number"><br>

<select id="source">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Dessert</option>
  <option>Snack</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<!-- FORM POST -->
<form id="postForm"
  action="https://script.google.com/macros/s/AKfycby13gdARdEuKeWgqDbyPaDvMAiqnYpPYVYrx-BuuI6zFKLgGz4EMEBiSXDBf1uX0QR7/exec"
  method="POST"
  target="hiddenFrame">

  <input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<!-- DATE FILTER -->
<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">

<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>
<button onclick="setRange(30)">Last 30 Days</button>

<hr>

<!-- TOTALS -->
<h3>Totals</h3>
<div>Calories: <span id="total"></span></div>
<div>Protein: <span id="proteinTotal"></span></div>
<div>Carbs: <span id="carbsTotal"></span></div>
<div>Fat: <span id="fatTotal"></span></div>

<hr>

<h3>Calories Over Time</h3>
<canvas id="chart"></canvas>

<h3>Calories by Meal</h3>
<canvas id="pie"></canvas>

<hr>

<!-- DEBUG -->
<h3>DEBUG DATA</h3>
<pre id="debug" style="background:#eee; padding:10px; font-size:10px;"></pre>

<hr>

<div style="font-size:12px; color:gray;">
  Version 4.0.0 FINAL
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby13gdARdEuKeWgqDbyPaDvMAiqnYpPYVYrx-BuuI6zFKLgGz4EMEBiSXDBf1uX0QR7/exec";


/* ---------------- ADD ENTRY ---------------- */
function addEntry() {
  const now = new Date();

  const localDate =
    now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0");

  const data = {
    date: localDate,
    name: document.getElementById("name").value,
    calories: document.getElementById("calories").value,
    protein: document.getElementById("protein").value || 0,
    carbs: document.getElementById("carbs").value || 0,
    fat: document.getElementById("fat").value || 0,
    source: document.getElementById("source").value
  };

  document.getElementById("formData").value =
    JSON.stringify(data);

  document.getElementById("postForm").submit();

  alert("Saved!");

  setTimeout(loadData, 800);
}


/* ---------------- LOAD DATA ---------------- */
async function loadData() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    // ✅ show debug always
    document.getElementById("debug").innerText =
      JSON.stringify(data, null, 2);

    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    // ✅ ROBUST NORMALIZATION (this fixes your 7-day issue)
    function normalize(d) {
      return new Date(d).toISOString().slice(0,10);
    }

    const filtered = data.filter(e => {
      if (!start || !end) return true;

      const d = normalize(e.date);

      return d >= start && d <= end;
    });

    /* -------- totals -------- */
    const totals = filtered.reduce((sum, e) => ({
      calories: sum.calories + Number(e.calories),
      protein: sum.protein + Number(e.protein),
      carbs: sum.carbs + Number(e.carbs),
      fat: sum.fat + Number(e.fat)
    }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

    document.getElementById("total").innerText = totals.calories;
    document.getElementById("proteinTotal").innerText = totals.protein;
    document.getElementById("carbsTotal").innerText = totals.carbs;
    document.getElementById("fatTotal").innerText = totals.fat;

    /* -------- line chart -------- */
    const byDate = {};
    filtered.forEach(e => {
      const d = normalize(e.date);
      if (!byDate[d]) byDate[d] = 0;
      byDate[d] += Number(e.calories);
    });

    renderChart(Object.keys(byDate), Object.values(byDate));

    /* -------- pie chart -------- */
    const bySource = {};
    filtered.forEach(e => {
      if (!bySource[e.source]) bySource[e.source] = 0;
      bySource[e.source] += Number(e.calories);
    });

    renderPie(Object.keys(bySource), Object.values(bySource));

  } catch (err) {
    console.error("Load error:", err);
  }
}


/* ---------------- DATE RANGE ---------------- */
function setRange(days) {
  const end = new Date();
  const start = new Date();

  start.setDate(end.getDate() - days);

  function format(d) {
    return d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
  }

  document.getElementById("startDate").value = format(start);
  document.getElementById("endDate").value = format(end);

  loadData();
}


/* ---------------- CHARTS ---------------- */
let chart, pie;

function renderChart(labels, values) {
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Calories",
        data: values
      }]
    }
  });
}

function renderPie(labels, values) {
  if (pie) pie.destroy();

  pie = new Chart(document.getElementById("pie"), {
    type: "pie",
    data: {
      labels,
      datasets: [{ data: values }]
    }
  });
}


/* ---------------- INIT ---------------- */
loadData();
</script>

</body>
</html>
