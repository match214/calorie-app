<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family:sans-serif; max-width:700px; margin:auto; padding:10px; }
    input, select, button {
      width:100%;
      padding:8px;
      font-size:16px;
      margin-top:4px;
    }
    input[type="range"] {
      width:100%;
    }
  </style>
</head>

<body>

<h1>Calorie Tracker</h1>

<div id="saveMsg" style="display:none;background:#d4edda;padding:8px;">✅ Saved!</div>

<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br>
Fiber: <input id="goalFiber" type="number" value="25"><br>
Iron: <input id="goalIron" type="number" value="10"><br><br>

<input id="nameInput" placeholder="Food"><br><br>

<!-- INPUTS WITH SLIDERS -->
Calories: <span id="caloriesDisplay">0</span>
<input id="calories" type="number" value="0" inputmode="numeric" oninput="syncSlider('calories')">
<input id="caloriesSlider" type="range" min="0" max="1000" value="0" oninput="syncInput('calories')"><br>

Protein: <span id="proteinDisplay">0</span>
<input id="protein" type="number" value="0" inputmode="numeric" oninput="syncSlider('protein')">
<input id="proteinSlider" type="range" min="0" max="100" value="0" oninput="syncInput('protein')"><br>

Carbs: <span id="carbsDisplay">0</span>
<input id="carbs" type="number" value="0" inputmode="numeric" oninput="syncSlider('carbs')">
<input id="carbsSlider" type="range" min="0" max="200" value="0" oninput="syncInput('carbs')"><br>

Fat: <span id="fatDisplay">0</span>
<input id="fat" type="number" value="0" inputmode="numeric" oninput="syncSlider('fat')">
<input id="fatSlider" type="range" min="0" max="100" value="0" oninput="syncInput('fat')"><br>

Fiber: <span id="fiberDisplay">0</span>
<input id="fiber" type="number" value="0" inputmode="numeric" oninput="syncSlider('fiber')">
<input id="fiberSlider" type="range" min="0" max="50" value="0" oninput="syncInput('fiber')"><br>

Iron: <span id="ironDisplay">0</span>
<input id="iron" type="number" value="0" inputmode="numeric" oninput="syncSlider('iron')">
<input id="ironSlider" type="range" min="0" max="30" value="0" oninput="syncInput('iron')"><br><br>

<select id="source">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Dessert</option>
  <option>Snack</option>
  <option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<form id="postForm"
  action="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec"
  method="POST"
  target="hiddenFrame">
  <input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">
<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>

<hr>

<b>Today</b>
<div id="todayStats"></div>

<b>Average</b>
<div id="avgStats"></div>

<hr>

<canvas id="chart" height="200"></canvas>
<canvas id="pie" height="200"></canvas>

<hr>

<pre id="debug"></pre>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec";

let chart, pie;

/* HELPERS */
function round(v){ return Math.round(v*10)/10; }
function pct(v,g){ return Math.round((v/g)*100)||0; }
function color(v,g){
  const p=v/g;
  return p<.5?"red":p<.75?"orange":p<.9?"gold":"green";
}

/* SLIDER SYNC */
function syncSlider(id){
  const v = +document.getElementById(id).value || 0;
  document.getElementById(id+"Slider").value = v;
  document.getElementById(id+"Display").innerText = v;
}

function syncInput(id){
  const v = +document.getElementById(id+"Slider").value;
  document.getElementById(id).value = v;
  document.getElementById(id+"Display").innerText = v;
}

/* ENTER SUBMIT */
document.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const active=document.activeElement;
    if(active && active.type==="date") return;
    e.preventDefault();
    addEntry();
  }
});

/* ADD ENTRY */
function addEntry(){

  const data = {
    date:new Date().toISOString().slice(0,10),
    name:nameInput.value.trim(),
    calories:+calories.value||0,
    protein:+protein.value||0,
    carbs:+carbs.value||0,
    fat:+fat.value||0,
    fiber:+fiber.value||0,
    iron:+iron.value||0,
    source:source.value
  };

  if(!data.name){ alert("Enter food"); return; }

  formData.value = JSON.stringify(data);
  postForm.submit();

  saveMsg.style.display="block";
  setTimeout(()=>saveMsg.style.display="none",1000);

  // ✅ RESET
  ["calories","protein","carbs","fat","fiber","iron"].forEach(id=>{
    document.getElementById(id).value=0;
    document.getElementById(id+"Slider").value=0;
    document.getElementById(id+"Display").innerText=0;
  });

  nameInput.value="";
  nameInput.focus();

  window.scrollTo({top:0,behavior:"smooth"});

  setTimeout(loadData,700);
}

/* LOAD (bulletproof &) */
function loadData(){
  document.querySelectorAll(".data-script").forEach(s=>s.remove());

  const s=document.createElement("script");
  s.className="data-script";
  s.src = URL + "?callback=handleData" + "&" + "cb=" + Date.now();
  document.body.appendChild(s);
}

function handleData(data){
  debug.innerText=JSON.stringify(data,null,2);
  process(data);
}

/* PROCESS */
function process(data){

  const clean=data.map(e=>({
    ...e,
    date:e.date.slice(0,10),
    fiber:+e.fiber||0,
    iron:+e.iron||0
  }));

  const sum=(arr,k)=>arr.reduce((s,e)=>s+(+e[k]||0),0);

  const today=new Date().toISOString().slice(0,10);
  const t=clean.filter(e=>e.date===today);

  const tVals={
    cal:sum(t,"calories"),
    pro:sum(t,"protein"),
    carb:sum(t,"carbs"),
    fat:sum(t,"fat"),
    fiber:sum(t,"fiber"),
    iron:sum(t,"iron")
  };

  todayStats.innerHTML =
  `Calories ${round(tVals.cal)}/${goalCalories.value} |
   Protein ${round(tVals.pro)}/${goalProtein.value} |
   Carbs ${round(tVals.carb)}/${goalCarbs.value} |
   Fat ${round(tVals.fat)}/${goalFat.value} |
   Fiber ${round(tVals.fiber)}/${goalFiber.value} |
   Iron ${round(tVals.iron)}/${goalIron.value}`;

  /* PERFORMANCE CHART */
  try {
    const byDate={};
    clean.forEach(e=>{
      if(!byDate[e.date]){
        byDate[e.date]={cal:0,pro:0,carb:0,fat:0,fiber:0,iron:0};
      }
      byDate[e.date].cal+=+e.calories||0;
      byDate[e.date].pro+=+e.protein||0;
      byDate[e.date].carb+=+e.carbs||0;
      byDate[e.date].fat+=+e.fat||0;
      byDate[e.date].fiber+=+e.fiber||0;
      byDate[e.date].iron+=+e.iron||0;
    });

    const labels=Object.keys(byDate).sort();

    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("chart").getContext("2d"),{
      type:"line",
      data:{
        labels,
        datasets:[
          {label:"Calories %",data:labels.map(d=>byDate[d].cal/goalCalories.value),borderColor:"red"},
          {label:"Protein %",data:labels.map(d=>byDate[d].pro/goalProtein.value),borderColor:"green"},
          {label:"Carbs %",data:labels.map(d=>byDate[d].carb/goalCarbs.value),borderColor:"orange"},
          {label:"Fat %",data:labels.map(d=>byDate[d].fat/goalFat.value),borderColor:"purple"},
          {label:"Fiber %",data:labels.map(d=>byDate[d].fiber/goalFiber.value),borderColor:"brown"},
          {label:"Iron %",data:labels.map(d=>byDate[d].iron/goalIron.value),borderColor:"teal"},
          {label:"Goal",data:labels.map(()=>1),borderDash:[5,5],borderColor:"black"}
        ]
      },
      options:{
        scales:{
          y:{ticks:{callback:v=>Math.round(v*100)+"%"}}
        }
      }
    });

  } catch(e){console.error(e);}
}

function setRange(d){
  let end=new Date(),start=new Date();
  start.setDate(end.getDate()-d);
  startDate.value=start.toISOString().slice(0,10);
  endDate.value=end.toISOString().slice(0,10);
  loadData();
}

loadData();
</script>

<div style="color:gray; margin-top:10px;">Version 26 ✅</div>

</body>
</html>
