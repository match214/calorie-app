
<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; max-width:600px; margin:auto;">

<h1>Calorie Tracker</h1>

<!-- GOALS -->
<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br><br>

<!-- FORM -->
<input id="name" placeholder="Food"><br>
<input id="calories" type="number" placeholder="Calories"><br>
<input id="protein" type="number" placeholder="Protein"><br>
<input id="carbs" type="number" placeholder="Carbs"><br>
<input id="fat" type="number" placeholder="Fat"><br>

<select id="source">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Dessert</option>
  <option>Snack</option>
  <option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<!-- POST FORM -->
<form id="postForm"
  action="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec"
  method="POST"
  target="hiddenFrame">

  <input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<!-- DATE FILTER -->
<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">

<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>

<hr>

<!-- TOTALS -->
<h3>Totals</h3>
Calories: <span id="total"></span><br>
Protein: <span id="proteinTotal"></span><br>
Carbs: <span id="carbsTotal"></span><br>
Fat: <span id="fatTotal"></span><br>

<h3>Goal Comparison</h3>
<div id="goalResults"></div>

<hr>

<h3>Calories Over Time</h3>
<canvas id="chart"></canvas>

<h3>Calories by Category</h3>
<canvas id="pie"></canvas>

<h3>Daily Performance vs Goal</h3>
<canvas id="goalChart"></canvas>

<hr>

<h3>DEBUG DATA</h3>
<pre id="debug" style="font-size:10px"></pre>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec";


/* ---------- ADD ENTRY ---------- */
function addEntry() {
  const now = new Date();
  const date = now.toISOString().slice(0,10);

  const data = {
    date,
    name: document.getElementById("name").value,
    calories: document.getElementById("calories").value,
    protein: document.getElementById("protein").value || 0,
    carbs: document.getElementById("carbs").value || 0,
    fat: document.getElementById("fat").value || 0,
    source: document.getElementById("source").value
  };

  document.getElementById("formData").value = JSON.stringify(data);
  document.getElementById("postForm").submit();

  setTimeout(loadData, 500);
}


/* ---------- LOAD DATA (JSONP) ---------- */
function loadData() {
  const script = document.createElement("script");
  script.src = SCRIPT_URL + "?callback=handleData";
  document.body.appendChild(script);
}

function handleData(data) {
  document.getElementById("debug").innerText =
    JSON.stringify(data, null, 2);

  processData(data);
}


/* ---------- PROCESS ---------- */
function processData(data) {

  // Remove empty entries
  const filtered = data.filter(e => e.name && e.calories);

  const totals = filtered.reduce((sum, e) => ({
    calories: sum.calories + Number(e.calories),
    protein: sum.protein + Number(e.protein),
    carbs: sum.carbs + Number(e.carbs),
    fat: sum.fat + Number(e.fat)
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  document.getElementById("total").innerText = totals.calories;
  document.getElementById("proteinTotal").innerText = totals.protein;
  document.getElementById("carbsTotal").innerText = totals.carbs;
  document.getElementById("fatTotal").innerText = totals.fat;

  /* ---------- GOAL COMPARISON ---------- */
  const cGoal = Number(goalCalories.value);

  const days = new Set(filtered.map(e => e.date.slice(0,10))).size || 1;
  const avg = totals.calories / days;

  document.getElementById("goalResults").innerText =
    avg > cGoal
      ? `⚠️ Over goal (avg ${Math.round(avg)})`
      : `✅ Under goal (avg ${Math.round(avg)})`;

  renderChart(filtered);
  renderPie(filtered);
  renderGoalChart(filtered);
}


/* ---------- MAIN CHART ---------- */
let chart, pie, goalChart;

function renderChart(data) {
  const byDate = {};

  data.forEach(e => {
    const d = e.date.slice(0,10);
    if (!byDate[d]) byDate[d] = 0;
    byDate[d] += Number(e.calories);
  });

  // ✅ SORT DATES
  const labels = Object.keys(byDate).sort();
  const calories = labels.map(d => byDate[d].calories / cGoal);
const protein  = labels.map(d => byDate[d].protein / pGoal);
const carbs    = labels.map(d => byDate[d].carbs / carbGoal);
const fat      = labels.map(d => byDate[d].fat / fGoal);

  const values = labels.map(d => byDate[d]);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Calories",
        data: values,
        borderColor: "blue"
      }]
    }
  });
}



/* ---------- PIE ---------- */
function renderPie(data) {
  const bySource = {};
  data.forEach(e => {
    if (!bySource[e.source]) bySource[e.source] = 0;
    bySource[e.source] += Number(e.calories);
  });

  if (pie) pie.destroy();

  pie = new Chart(document.getElementById("pie"), {
    type: "pie",
    data: {
      labels: Object.keys(bySource),
      datasets: [{ data: Object.values(bySource) }]
    }
  });
}


/* ---------- GOAL CHART ---------- */
function renderGoalChart(data) {

  const cGoal = Number(goalCalories.value);
  const pGoal = Number(goalProtein.value);
  const carbGoal = Number(goalCarbs.value);
  const fGoal = Number(goalFat.value);

  // group daily totals
  const byDate = {};

  data.forEach(e => {
    const d = e.date.slice(0,10);

    if (!byDate[d]) {
      byDate[d] = {
        calories: 0,
        protein: 0,
        carbs: 0,
        fat: 0
      };
    }

    byDate[d].calories += Number(e.calories);
    byDate[d].protein += Number(e.protein);
    byDate[d].carbs += Number(e.carbs);
    byDate[d].fat += Number(e.fat);
  });

  const labels = Object.keys(byDate);

  const calories = labels.map(d => byDate[d].calories / cGoal);
  const protein = labels.map(d => byDate[d].protein / pGoal);
  const carbs = labels.map(d => byDate[d].carbs / carbGoal);
  const fat = labels.map(d => byDate[d].fat / fGoal);

  // goal line = 100%
  const goalLine = labels.map(() => 1);

  if (goalChart) goalChart.destroy();

  goalChart = new Chart(document.getElementById("goalChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Calories %",
          data: calories,
          borderColor: "blue"
        },
        {
          label: "Protein %",
          data: protein,
          borderColor: "green"
        },
        {
          label: "Carbs %",
          data: carbs,
          borderColor: "orange"
        },
        {
          label: "Fat %",
          data: fat,
          borderColor: "purple"
        },
        {
          label: "Goal (100%)",
          data: goalLine,
          borderColor: "black",
          borderDash: [5,5]
        }
      ]
    },
    options: {
      scales: {
        y: {
          ticks: {
            callback: value => Math.round(value * 100) + "%"
          }
        }
      }
    }
  });
}


/* ---------- RANGE ---------- */
function setRange(days) {
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - days);

  function f(d) {
    return d.getFullYear() + "-" +
      String(d.getMonth()+1).padStart(2,"0") + "-" +
      String(d.getDate()).padStart(2,"0");
  }

  startDate.value = f(start);
  endDate.value = f(end);

  loadData();
}


/* ---------- INIT ---------- */
loadData();
</script>

</body>
</html>
