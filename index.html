<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; max-width:700px; margin:auto;">

<h1>Calorie Tracker</h1>

<!-- SAVE MESSAGE -->
<div id="saveMsg" style="background:#d4edda; padding:8px; display:none;">
  ✅ Saved!
</div>

<!-- GOALS -->
<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br><br>

<!-- FOOD -->
<input id="nameInput" placeholder="Food"><br><br>

<!-- QUICK BUTTONS -->
Calories Quick:
<button onclick="quickSet('calories',200)">200</button>
<button onclick="quickSet('calories',400)">400</button>
<button onclick="quickSet('calories',600)">600</button>
<br><br>

<!-- INPUTS -->
Calories: <span id="caloriesDisplay">0</span><br>
<input id="calories" type="number" value="0" oninput="syncSlider('calories')">
<input id="caloriesSlider" type="range" min="0" max="2000" value="0" oninput="syncInput('calories')"><br>

Protein: <span id="proteinDisplay">0</span><br>
<input id="protein" type="number" value="0" oninput="syncSlider('protein')">
<input id="proteinSlider" type="range" min="0" max="200" value="0" oninput="syncInput('protein')"><br>

Carbs: <span id="carbsDisplay">0</span><br>
<input id="carbs" type="number" value="0" oninput="syncSlider('carbs')">
<input id="carbsSlider" type="range" min="0" max="300" value="0" oninput="syncInput('carbs')"><br>

Fat: <span id="fatDisplay">0</span><br>
<input id="fat" type="number" value="0" oninput="syncSlider('fat')">
<input id="fatSlider" type="range" min="0" max="150" value="0" oninput="syncInput('fat')"><br><br>

<select id="source">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Dessert</option>
  <option>Snack</option>
  <option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<form id="postForm"
  action="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec"
  method="POST"
  target="hiddenFrame">

  <input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">
<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>

<hr>

<h3>Totals</h3>
Calories: <span id="total"></span><br>
Protein: <span id="proteinTotal"></span><br>
Carbs: <span id="carbsTotal"></span><br>
Fat: <span id="fatTotal"></span><br>

<hr>

<h3>Calories Over Time</h3>
<canvas id="chart"></canvas>

<h3>Calories by Category</h3>
<canvas id="pie"></canvas>

<h3>Performance vs Goal (%)</h3>
<canvas id="goalChart"></canvas>

<hr>

<pre id="debug" style="font-size:10px"></pre>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec";

/* ---------- ADD ENTRY (FIXED) ---------- */
function addEntry() {

  const now = new Date();
  const date =
    now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0");

  const data = {
    date: date,
    name: document.getElementById("nameInput").value.trim(),
    calories: Number(document.getElementById("calories").value) || 0,
    protein: Number(document.getElementById("protein").value) || 0,
    carbs: Number(document.getElementById("carbs").value) || 0,
    fat: Number(document.getElementById("fat").value) || 0,
    source: document.getElementById("source").value
  };

  // prevent blank name entries
  if (!data.name) {
    alert("Please enter a food name");
    return;
  }

  document.getElementById("formData").value = JSON.stringify(data);
  document.getElementById("postForm").submit();

  // ✅ SHOW "SAVED!" MESSAGE
  const msg = document.getElementById("saveMsg");
  msg.style.display = "block";

  setTimeout(() => {
    msg.style.display = "none";
  }, 1500);

  // ✅ RESET INPUTS CLEANLY
  ["calories","protein","carbs","fat"].forEach(f=>{
    document.getElementById(f).value = 0;
    document.getElementById(f + "Slider").value = 0;
    document.getElementById(f + "Display").innerText = 0;
  });

  document.getElementById("nameInput").value = "";

  setTimeout(loadData, 600);
}

/* ---------- INPUT SYNC ---------- */
function syncSlider(field){
  const val = document.getElementById(field).value || 0;
  document.getElementById(field+"Slider").value = val;
  document.getElementById(field+"Display").innerText = val;
}

function syncInput(field){
  const val = document.getElementById(field+"Slider").value;
  document.getElementById(field).value = val;
  document.getElementById(field+"Display").innerText = val;
}

/* ---------- QUICK BUTTON ---------- */
function quickSet(field,val){
  document.getElementById(field).value = val;
  syncSlider(field);
}

/* ---------- LOAD DATA (NO CACHE) ---------- */
function loadData(){
  const script = document.createElement("script");
  script.src = SCRIPT_URL + "?callback=handleData&cb=" + Date.now();
  document.body.appendChild(script);
}

function handleData(data){
  document.getElementById("debug").innerText =
    JSON.stringify(data, null, 2);

  processData(data);
}

/* ---------- PROCESS ---------- */
function processData(data){

  const filtered = data.filter(e => e.name && Number(e.calories) > 0);

  const totals = filtered.reduce((s,e)=>({
    calories:s.calories+Number(e.calories),
    protein:s.protein+Number(e.protein),
    carbs:s.carbs+Number(e.carbs),
    fat:s.fat+Number(e.fat)
  }),{calories:0,protein:0,carbs:0,fat:0});

  total.innerText = totals.calories;
  proteinTotal.innerText = totals.protein;
  carbsTotal.innerText = totals.carbs;
  fatTotal.innerText = totals.fat;

  renderChart(filtered);
  renderBar(filtered);
  renderGoalChart(filtered);
}

/* ---------- CHARTS ---------- */
let chart, pie, goalChart;

function renderChart(data){
  const byDate={};

  data.forEach(e=>{
    const d=e.date;
    if(!byDate[d]) byDate[d]=0;
    byDate[d]+=Number(e.calories);
  });

  const labels=Object.keys(byDate).sort();
  const values=labels.map(d=>byDate[d]);

  if(chart) chart.destroy();

  chart=new Chart(chartCanvas("chart"),{
    type:"line",
    data:{labels,datasets:[{label:"Calories",data:values}]}
  });
}

function renderBar(data){
  const bySource={};

  data.forEach(e=>{
    if(!bySource[e.source]) bySource[e.source]=0;
    bySource[e.source]+=Number(e.calories);
  });

  if(pie) pie.destroy();

  pie=new Chart(chartCanvas("pie"),{
    type:"bar",
    data:{
      labels:Object.keys(bySource),
      datasets:[{label:"Calories",data:Object.values(bySource)}]
    }
  });
}

function renderGoalChart(data){
  const goal=goalCalories.value;

  const byDate={};

  data.forEach(e=>{
    const d=e.date;
    if(!byDate[d]) byDate[d]=0;
    byDate[d]+=Number(e.calories);
  });

  const labels=Object.keys(byDate).sort();
  const values=labels.map(d=>byDate[d] / goal);

  if(goalChart) goalChart.destroy();

  goalChart=new Chart(chartCanvas("goalChart"),{
    type:"line",
    data:{labels,datasets:[{label:"Calories %",data:values}]}
  });
}

function chartCanvas(id){
  return document.getElementById(id);
}

function setRange(days){
  const end=new Date();
  const start=new Date();
  start.setDate(end.getDate()-days);

  function f(d){
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }

  startDate.value=f(start);
  endDate.value=f(end);
  loadData();
}

loadData();
</script>

<div style="margin-top:10px; color:gray;">Version 8.0 ✅</div>

</body>
</html>
