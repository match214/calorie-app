
<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="font-family:sans-serif; max-width:600px; margin:auto;">

<h1>Calorie Tracker</h1>

<!-- FORM -->
<input id="name" placeholder="Food"><br>
<input id="calories" placeholder="Calories" type="number"><br>
<input id="protein" placeholder="Protein" type="number"><br>
<input id="carbs" placeholder="Carbs" type="number"><br>
<input id="fat" placeholder="Fat" type="number"><br>

<select id="source">
  <option>Home</option>
  <option>Restaurant</option>
  <option>Snack</option>
  <option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<!-- DATE FILTER -->
<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">
<button onclick="loadData()">Apply</button>

<hr>

<h3>Total Calories: <span id="total"></span></h3>

<canvas id="chart"></canvas>

<script>
const SCRIPT_URL = https://script.google.com/macros/s/AKfycbyv3PzeI1hEm-OmobXrQ-zcwr5WnSSGHvb_Ul7rRnbD_GmQjF7HB6Fg7dKi-RsFkysI/exec;

async function addEntry() {
  const data = {
    date: new Date().toISOString().slice(0,10),
    name: document.getElementById("name").value,
    calories: Number(document.getElementById("calories").value),
    protein: Number(document.getElementById("protein").value),
    carbs: Number(document.getElementById("carbs").value),
    fat: Number(document.getElementById("fat").value),
    source: document.getElementById("source").value
  };

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Saved!");
  loadData();
}

async function loadData() {
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();

  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  const filtered = data.filter(e => {
    if (!start || !end) return true;
    return e.date >= start && e.date <= end;
  });

  // TOTAL
  const total = filtered.reduce((sum, e) => sum + e.calories, 0);
  document.getElementById("total").innerText = total;

  // GROUP BY DATE
  const byDate = {};
  filtered.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = 0;
    byDate[e.date] += e.calories;
  });

  const labels = Object.keys(byDate);
  const values = Object.values(byDate);

  renderChart(labels, values);
}

let chart;

function renderChart(labels, values) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Calories",
        data: values
      }]
    }
  });
}

// Load initial data
loadData();
</script>

</body>
</html>
