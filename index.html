<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; max-width:700px; margin:auto;">

<h1>Calorie Tracker</h1>

<!-- GOALS -->
<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br><br>

<!-- FORM -->
<input id="name" placeholder="Food"><br>
<input id="calories" type="number" placeholder="Calories"><br>
<input id="protein" type="number" placeholder="Protein"><br>
<input id="carbs" type="number" placeholder="Carbs"><br>
<input id="fat" type="number" placeholder="Fat"><br>

<select id="source">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Dessert</option>
  <option>Snack</option>
  <option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<form id="postForm"
  action="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec"
  method="POST"
  target="hiddenFrame">
  <input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">
<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>

<hr>

<h3>Totals</h3>
Calories: <span id="total"></span><br>
Protein: <span id="proteinTotal"></span><br>
Carbs: <span id="carbsTotal"></span><br>
Fat: <span id="fatTotal"></span><br>

<hr>

<h3>Calories Over Time</h3>
<canvas id="chart"></canvas>

<h3>Calories by Category</h3>
<canvas id="pie"></canvas>

<h3>Performance vs Goal (%)</h3>
<canvas id="goalChart"></canvas>

<hr>

<pre id="debug" style="font-size:10px"></pre>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec";

/* ---------- ADD ---------- */
function addEntry() {
  const now = new Date();
  const date = now.toISOString().slice(0,10);

  const data = {
    date,
    name: name.value,
    calories: calories.value,
    protein: protein.value || 0,
    carbs: carbs.value || 0,
    fat: fat.value || 0,
    source: source.value
  };

  formData.value = JSON.stringify(data);
  postForm.submit();

  setTimeout(loadData, 500);
}

/* ---------- LOAD (JSONP) ---------- */
function loadData() {
  const script = document.createElement("script");
  script.src = SCRIPT_URL + "?callback=handleData";
  document.body.appendChild(script);
}

function handleData(data) {
  debug.innerText = JSON.stringify(data, null, 2);
  processData(data);
}

/* ---------- PROCESS ---------- */
function processData(data) {

  const start = startDate.value;
  const end = endDate.value;

  function normalize(d) {
    return new Date(d).toISOString().slice(0,10);
  }

  const filtered = data
    .filter(e => e.name && e.calories)
    .filter(e => {
      if (!start || !end) return true;
      const d = normalize(e.date);
      return d >= start && d <= end;
    });

  const totals = filtered.reduce((s,e)=>({
    calories:s.calories+Number(e.calories),
    protein:s.protein+Number(e.protein),
    carbs:s.carbs+Number(e.carbs),
    fat:s.fat+Number(e.fat)
  }),{calories:0,protein:0,carbs:0,fat:0});

  total.innerText = totals.calories;
  proteinTotal.innerText = totals.protein;
  carbsTotal.innerText = totals.carbs;
  fatTotal.innerText = totals.fat;

  renderChart(filtered);
  renderPie(filtered);
  renderGoalChart(filtered);
}

/* ---------- CHARTS ---------- */
let chart, pie, goalChart;

function renderChart(data) {
  const byDate = {};

  data.forEach(e=>{
    const d = e.date.slice(0,10);
    if(!byDate[d]) byDate[d]=0;
    byDate[d]+=Number(e.calories);
  });

  const labels = Object.keys(byDate).sort();
  const values = labels.map(d=>byDate[d]);

  if(chart) chart.destroy();

  chart = new Chart(chartCanvas("chart"),{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"Calories",
        data:values,
        borderColor:"blue"
      }]
    }
  });
}

function renderPie(data){
  const bySource={};

  data.forEach(e=>{
    if(!bySource[e.source]) bySource[e.source]=0;
    bySource[e.source]+=Number(e.calories);
  });

  if(pie) pie.destroy();

  pie = new Chart(chartCanvas("pie"),{
    type:"pie",
    data:{
      labels:Object.keys(bySource),
      datasets:[{data:Object.values(bySource)}]
    }
  });
}

/* ---------- NORMALIZED GOAL CHART ---------- */
function renderGoalChart(data){

  const cGoal=Number(goalCalories.value);
  const pGoal=Number(goalProtein.value);
  const carbGoal=Number(goalCarbs.value);
  const fGoal=Number(goalFat.value);

  const byDate={};

  data.forEach(e=>{
    const d=e.date.slice(0,10);

    if(!byDate[d]){
      byDate[d]={cal:0,pro:0,carb:0,fat:0};
    }

    byDate[d].cal+=Number(e.calories);
    byDate[d].pro+=Number(e.protein);
    byDate[d].carb+=Number(e.carbs);
    byDate[d].fat+=Number(e.fat);
  });

  const labels=Object.keys(byDate).sort();

  const cal=labels.map(d=>byDate[d].cal/cGoal);
  const pro=labels.map(d=>byDate[d].pro/pGoal);
  const carb=labels.map(d=>byDate[d].carb/carbGoal);
  const fat=labels.map(d=>byDate[d].fat/fGoal);
  const goalLine=labels.map(()=>1);

  if(goalChart) goalChart.destroy();

  goalChart=new Chart(chartCanvas("goalChart"),{
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"Calories %",data:cal,borderColor:"blue"},
        {label:"Protein %",data:pro,borderColor:"green"},
        {label:"Carbs %",data:carb,borderColor:"orange"},
        {label:"Fat %",data:fat,borderColor:"purple"},
        {label:"Goal",data:goalLine,borderColor:"black",borderDash:[5,5]}
      ]
    },
    options:{
      scales:{
        y:{
          ticks:{
            callback:v=>Math.round(v*100)+"%"
          }
        }
      }
    }
  });
}

/* ---------- HELPERS ---------- */
function chartCanvas(id){
  return document.getElementById(id);
}

function setRange(days){
  const end=new Date();
  const start=new Date();
  start.setDate(end.getDate()-days);

  function f(d){
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }

  startDate.value=f(start);
  endDate.value=f(end);

  loadData();
}

/* ---------- INIT ---------- */
loadData();
</script>

</body>
</html>
