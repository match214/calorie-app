
<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; max-width:700px; margin:auto;">

<h1>Calorie Tracker</h1>

<div id="saveMsg" style="background:#d4edda; padding:8px; display:none;">
✅ Saved!
</div>

<h3>Daily Goals</h3>
Calories: <input id="goalCalories" type="number" value="2200"><br>
Protein: <input id="goalProtein" type="number" value="150"><br>
Carbs: <input id="goalCarbs" type="number" value="275"><br>
Fat: <input id="goalFat" type="number" value="70"><br><br>

<input id="nameInput" placeholder="Food"><br><br>

<!-- INPUTS -->
Calories: <span id="caloriesDisplay">0</span><br>
<input id="calories" type="number" value="0" oninput="syncSlider('calories')">
<input id="caloriesSlider" type="range" min="0" max="1000" oninput="syncInput('calories')"><br><br>

Protein: <span id="proteinDisplay">0</span><br>
<input id="protein" type="number" value="0" oninput="syncSlider('protein')">
<input id="proteinSlider" type="range" min="0" max="100" oninput="syncInput('protein')"><br><br>

Carbs: <span id="carbsDisplay">0</span><br>
<input id="carbs" type="number" value="0" oninput="syncSlider('carbs')">
<input id="carbsSlider" type="range" min="0" max="200" oninput="syncInput('carbs')"><br><br>

Fat: <span id="fatDisplay">0</span><br>
<input id="fat" type="number" value="0" oninput="syncSlider('fat')">
<input id="fatSlider" type="range" min="0" max="100" oninput="syncInput('fat')"><br><br>

<select id="source">
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
<option>Dessert</option>
<option>Snack</option>
<option>Drink</option>
</select><br><br>

<button onclick="addEntry()">Add</button>

<hr>

<form id="postForm"
action="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec"
method="POST"
target="hiddenFrame">
<input type="hidden" name="data" id="formData">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<hr>

<h3>Date Range</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">
<button onclick="loadData()">Apply</button>
<button onclick="setRange(7)">Last 7 Days</button>

<hr>

<b>Today</b><br>
<span id="todayStats"></span>

<br><br>

<b>Average (Range)</b><br>
<span id="avgStats"></span>

<hr>

<canvas id="chart"></canvas>
<canvas id="pie"></canvas>
<canvas id="goalChart"></canvas>

<script>
const URL="https://script.google.com/macros/s/AKfycbyRojJQkoNQjm7acHrM402DNUZeuksdxLhr-AYWy_KiCpWIt4HUhegwNjn1bHlAiWU3/exec";

function addEntry(){
const now=new Date();
const date=now.toISOString().slice(0,10);

const data={
date,
name:nameInput.value.trim(),
calories:+calories.value||0,
protein:+protein.value||0,
carbs:+carbs.value||0,
fat:+fat.value||0,
source:source.value
};

if(!data.name)return alert("Enter food");

formData.value=JSON.stringify(data);
postForm.submit();

saveMsg.style.display="block";
setTimeout(()=>saveMsg.style.display="none",1000);

["calories","protein","carbs","fat"].forEach(f=>{
document.getElementById(f).value=0;
document.getElementById(f+"Slider").value=0;
document.getElementById(f+"Display").innerText=0;
});

nameInput.value="";
setTimeout(loadData,500);
}

function syncSlider(f){
const v=document.getElementById(f).value||0;
document.getElementById(f+"Slider").value=v;
document.getElementById(f+"Display").innerText=v;
}
function syncInput(f){
const v=document.getElementById(f+"Slider").value;
document.getElementById(f).value=v;
document.getElementById(f+"Display").innerText=v;
}

function loadData(){
let s=document.createElement("script");
s.src=URL+"?callback=handleData&cb="+Date.now();
document.body.appendChild(s);
}

function handleData(data){
process(data);
}

function process(data){

let start=startDate.value,end=endDate.value;

const filtered=data.filter(e=>e.name && e.source && +e.calories>0)
.filter(e=>{
if(!start||!end) return true;
return e.date>=start && e.date<=end;
});

// TODAY
let today=new Date().toISOString().slice(0,10);
let t=data.filter(e=>e.date===today);

let sum=(arr,key)=>arr.reduce((s,e)=>s+(+e[key]),0);

function r(v){return Math.round(v);}
function pct(a,b){return Math.round(100*a/b)||0;}

todayStats.innerText=`Calories ${r(sum(t,"calories"))}/${goalCalories.value} (${pct(sum(t,"calories"),goalCalories.value)}%) |
Protein ${r(sum(t,"protein"))}/${goalProtein.value} |
Carbs ${r(sum(t,"carbs"))}/${goalCarbs.value} |
Fat ${r(sum(t,"fat"))}/${goalFat.value}`;

// ✅ AVERAGE
let days=[...new Set(filtered.map(e=>e.date))];
let n=days.length||1;

let avg={
calories:sum(filtered,"calories")/n,
protein:sum(filtered,"protein")/n,
carbs:sum(filtered,"carbs")/n,
fat:sum(filtered,"fat")/n
};

function color(v,goal){
let p=v/goal;
return p<.5?"red":p<.75?"orange":p<.9?"gold":"green";
}

avgStats.innerHTML=
`Calories <span style="color:${color(avg.calories,goalCalories.value)}">${r(avg.calories)}/${goalCalories.value}</span> |
Protein <span style="color:${color(avg.protein,goalProtein.value)}">${r(avg.protein)}/${goalProtein.value}</span> |
Carbs <span style="color:${color(avg.carbs,goalCarbs.value)}">${r(avg.carbs)}/${goalCarbs.value}</span> |
Fat <span style="color:${color(avg.fat,goalFat.value)}">${r(avg.fat)}/${goalFat.value}</span>`;

// CHARTS
renderChart(filtered);
renderBar(filtered);
renderGoalChart(filtered);
}

let chart,pie,goalChart;

function renderChart(data){
let by={};
data.forEach(e=>{if(!by[e.date])by[e.date]=0;by[e.date]+=+e.calories;});
let labels=Object.keys(by).sort();

if(chart)chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels,datasets:[{label:"Calories",data:labels.map(d=>by[d])}]}
});
}

function renderBar(data){
let order=["Breakfast","Lunch","Snack","Dinner","Dessert","Drink"];
let colors={Breakfast:"red",Lunch:"orange",Snack:"yellow",Dinner:"green",Dessert:"blue",Drink:"purple"};

let by={};
data.forEach(e=>{
if(!order.includes(e.source))return;
if(!by[e.source])by[e.source]=0;
by[e.source]+=+e.calories;
});

if(pie)pie.destroy();
pie=new Chart(document.getElementById("pie"),{
type:"bar",
data:{
labels:order.filter(s=>by[s]),
datasets:[{
data:order.filter(s=>by[s]).map(s=>by[s]),
backgroundColor:order.filter(s=>by[s]).map(s=>colors[s])
}]
}
});
}

function renderGoalChart(data){
let goal=goalCalories.value;

let by={};
data.forEach(e=>{
if(!by[e.date])by[e.date]=0;
by[e.date]+=+e.calories;
});

let labels=Object.keys(by).sort();

if(goalChart)goalChart.destroy();
goalChart=new Chart(document.getElementById("goalChart"),{
type:"line",
data:{
labels,
datasets:[
{label:"Calories %",data:labels.map(d=>by[d]/goal)},
{label:"Goal",data:labels.map(()=>1),borderDash:[5,5]}
]
},
options:{
scales:{y:{ticks:{callback:v=>Math.round(v*100)+"%"}}}
}
});
}

function setRange(d){
let end=new Date();
let start=new Date();
start.setDate(end.getDate()-d);

startDate.value=start.toISOString().slice(0,10);
endDate.value=end.toISOString().slice(0,10);

loadData();
}

loadData();
</script>

<div>Version 14.0 ✅</div>

</body>
</html>
